<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" type="text/css"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
            integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
            crossorigin="anonymous"></script>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
          integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">

</head>
<body class="bg-dark">

<div class="container">
    <div class="row">
        <div class="card mt-50" style="width: 100%; height: 100%">
            <div class="card-header" style="text-align: center">
                <h1>Welcome to Car Price Predictor</h1>
            </div>
            <div class="card-body">
                <div class="col-12" style="text-align: center">
                    <h5>This app predicts the price of a car you want to sell. Try filling the details below: </h5>
                </div>
                <br>
                <form accept-charset="utf-8" name="Modelform">
                    {% if error_message %}
                    <div class="col-md-10 form-group" style="text-align: center">
                        <div class="alert alert-danger" role="alert">{{ error_message }}</div>
                    </div>
                    {% endif %}
                    <div class="col-md-10 form-group" style="text-align: center">
                        <label><b>Select the company:</b> </label><br>
                        <select class="selectpicker form-control" id="company" name="company" required
                                onchange="load_car_models(this.id,'car_models')">
                            {% for company in companies %}
                            <option value="{{ company }}">{{ company }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-10 form-group" style="text-align: center">
                        <label><b>Select the model:</b> </label><br>
                        <select class="selectpicker form-control" id="car_models" name="car_models" required>
                            <option value="">Select Model</option>
                        </select>
                    </div>
                    <div class="col-md-10 form-group" style="text-align: center">
                        <label><b>Select Year of Purchase:</b> </label><br>
                        <select class="selectpicker form-control" id="year" name="year" required>
                            {% for year in years %}
                            <option value="{{ year }}">{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-10 form-group" style="text-align: center">
                        <label><b>Select the Fuel Type:</b> </label><br>
                        <select class="selectpicker form-control" id="fuel_type" name="fuel_type" required>
                            {% for fuel in fuel_types %}
                            <option value="{{ fuel }}">{{ fuel }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-10 form-group" style="text-align: center">
                        <label><b>Enter the Number of Kilometres that the car has travelled:</b> </label><br>
                        <input type="text" class="form-control" id="kilo_driven" name="kilo_driven"
                               placeholder="Enter the kilometres driven ">
                    </div>
                    <div class="col-md-10 form-group" style="text-align: center">
                        <button type="button" class="btn btn-primary form-control" onclick="send_data()">Predict Price</button>
                    </div>
                </form>
                <br>
                <div class="row">
                    <div class="col-12" style="text-align: center">
                        <h4><span id="prediction"></span></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // @ts-ignore
    const companyModels = {{ company_models|default({}) | tojson | safe }} || {};

    function load_car_models(company_id, car_model_id) {
        try {
            const company = document.getElementById(company_id).value;
            const carModelSelect = document.getElementById(car_model_id);
            
            if (!carModelSelect) {
                console.error('Model select element not found');
                return;
            }
            
            carModelSelect.innerHTML = '<option value="">Select Model</option>';

            if (company && companyModels[company] && Array.isArray(companyModels[company])) {
                companyModels[company].forEach(function(model) {
                    const newOption = document.createElement('option');
                    newOption.value = model;
                    newOption.textContent = model;
                    carModelSelect.appendChild(newOption);
                });
            }
        } catch (error) {
            console.error('Error loading car models:', error);
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        try {
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function(event) {
                    event.preventDefault();
                    send_data();
                });
            }
            load_car_models('company', 'car_models');
        } catch (error) {
            console.error('Error in DOMContentLoaded:', error);
        }
    });

    function send_data() {
        try {
            const form = document.querySelector('form');
            if (!form) {
                console.error('Form not found');
                return;
            }
            
            const fd = new FormData(form);
            const xhr = new XMLHttpRequest();

            xhr.open('POST', '/predict', true);
            document.getElementById('prediction').textContent = 'Wait! Predicting Price.....';

            xhr.onreadystatechange = function() {
                if (xhr.readyState === XMLHttpRequest.DONE) {
                    if (xhr.status === 200) {
                        document.getElementById('prediction').textContent = 'Prediction: ₹' + xhr.responseText;
                    } else {
                        document.getElementById('prediction').textContent = 'Error: ' + xhr.responseText;
                    }
                }
            };

            xhr.onerror = function() {
                document.getElementById('prediction').textContent = 'Error: Failed to connect to server';
                console.error('XHR Error');
            };

            xhr.send(fd);
        } catch (error) {
            console.error('Error in send_data:', error);
            document.getElementById('prediction').textContent = 'Error: ' + error.message;
        }
    }
</script>


<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>
</body>
</html>
